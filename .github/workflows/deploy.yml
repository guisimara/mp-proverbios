name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção
        run: npm run build

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp para Hostinger
        run: |
          lftp -u "${{ secrets.SSH_USER }}","${{ secrets.SSH_PASS }}" \
            sftp://${{ secrets.SSH_HOST }}:65002 <<EOF
          set sftp:auto-confirm yes
          set net:timeout 30
          set net:max-retries 3
          mirror -R --delete --verbose dist/ domains/leticiafessel.com.br/public_html/lp/
          bye
          EOF
